info:
  name: order tracking
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseurl}}/api/customer/orders/:sttNumber/tracking"
  params:
    - name: sttNumber
      value: A0018990
      type: path
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
