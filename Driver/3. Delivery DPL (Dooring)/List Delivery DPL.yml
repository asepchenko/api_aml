info:
  name: List Delivery DPL
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseurl}}/api/driver/delivery?page=1&limit=20"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
    - name: status
      value: Open
      type: query
      description: Open | On Process Delivery | Delivered | Received
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  SP: sp_driver_delivery_list_json

  Default: aktif (bukan Delivered/Received), 30 hari.
