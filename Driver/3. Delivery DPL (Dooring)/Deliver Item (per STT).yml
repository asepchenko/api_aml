info:
  name: Deliver Item (per STT)
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseurl}}/api/driver/delivery/46/items/ORD-0000067200/deliver"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "recipient": "Budi Santoso",
        "description": "Diterima lengkap",
        "photo_base64": "{{photo_base64}}",
        "scan_code": "COLLY-001",
        "scan_lat": -6.2,
        "scan_lng": 106.8,
        "scan_device": "android-driver"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  SP: sp_driver_delivery_deliver_item_json

  Wajib: recipient. Opsional: photo_base64 (raw base64), description, scan_code/lat/lng/device.

  Ulangi per STT (setelah scan koli lengkap) sampai dpl_status = Delivered.
