info:
  name: List Pickup Retur
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/driver/pickup-retur?page=1&limit=20"
  params:
    - name: status
      value: assigned
      type: query
      description: draft | assigned | on_trip | arrived | cancelled
      disabled: true
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "const json = res.getBody();\r

        if (json.data && json.data.pickup_returs && json.data.pickup_returs[0]) {\r

        \  const r = json.data.pickup_returs[0];\r

        \  pm.collectionVariables.set('pickup_retur_id', r.id || r.code || '');\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "SP: sp_driver_pickup_retur_list_json"
