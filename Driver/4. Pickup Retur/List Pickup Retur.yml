info:
  name: List Pickup Retur
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseurl}}/api/driver/pickup-retur?page=1&limit=20"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
    - name: status
      value: assigned
      type: query
      description: draft | assigned | on_trip | arrived | cancelled
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "SP: sp_driver_pickup_retur_list_json"
