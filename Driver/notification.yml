info:
  name: notification
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseurl}}/api/driver/notifications?is_read=false&type=pickup_new&page=1&limit=10"
  params:
    - name: is_read
      value: "false"
      type: query
    - name: type
      value: pickup_new
      type: query
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
  body:
    type: json
    data: "{\r

      \    \"is_read\" : false,\r

      \    \"type\" : \"pickup_new\",\r

      \    \"page\" : 1,\r

      \    \"limit\" : 10\r

      }"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
